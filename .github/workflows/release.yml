name: Release Binaries

# Build standalone single-file binaries (macOS + Linux, arm64 + x64) and
# attach them to a GitHub Release. Bun cross-compiles all targets from a
# single host, so one runner produces every artifact.
#
# Trigger by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Or run manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify build and tests
        run: npm run check

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build cross-platform binaries
        run: npm run build:binaries

      - name: List artifacts
        run: ls -lh dist-bin

      - name: Upload artifacts (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dvalincode-binaries
          path: dist-bin/*

      - name: Publish GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-bin/dvalincode-macos-arm64
            dist-bin/dvalincode-macos-x64
            dist-bin/dvalincode-linux-arm64
            dist-bin/dvalincode-linux-x64
            dist-bin/SHA256SUMS.txt
          generate_release_notes: true
