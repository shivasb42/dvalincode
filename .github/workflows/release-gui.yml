name: Release Desktop GUI (experimental)

# Build the native desktop GUI app (webview-bun) and publish it as a GitHub
# *pre-release*, on a track separate from the stable CLI + Web bundle.
#
# Why a separate track:
#   - The desktop app depends on a native system webview (WKWebView / WebView2 /
#     WebKitGTK) and is currently experimental / unverified per platform.
#   - It is published as a pre-release so `releases/latest` (used by the one-line
#     installer) keeps pointing at the stable CLI release — the installer never
#     pulls the GUI.
#
# Trigger: push a `gui-v*` tag (e.g. gui-v0.7.0), or run manually.
#   git tag gui-v0.7.0 && git push origin gui-v0.7.0
#
# Builds run on macOS: scripts/build-gui.sh cross-compiles every target there
# (with skip-on-failure for flaky cross-builds) and has the sips/iconutil tools
# needed for the macOS .app icon. Linux/Windows GUI binaries are best-effort and
# should be validated on their own OS before being relied on.

on:
  push:
    tags:
      - 'gui-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gui:
    runs-on: macos-latest

    # Optional Developer ID signing + notarization — same secrets as release.yml.
    # Without them the .app is ad-hoc signed (preview-grade). With them the app
    # is Developer-ID signed, notarized, and stapled (prompt-free download).
    env:
      DVALINCODE_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      # `secrets` can't be used in step `if:` — fold presence into env booleans.
      HAS_SIGNING_CERT: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
      HAS_NOTARY_CREDS: ${{ secrets.APPLE_ID != '' }}

    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install web frontend dependencies
        run: cd web && npm ci

      - name: Type-check and test
        run: npm run check

      - name: Setup Bun
        # oven-sh/setup-bun v2.2.0
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      # Import the Developer ID cert (skipped without the secret → ad-hoc).
      - name: Import Developer ID certificate
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          CERT_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KP="$(openssl rand -base64 24)"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build desktop GUI artifacts (all platforms, best-effort)
        run: npm run build:gui

      # Notarize + staple the macOS .app, then repackage the archive so the
      # stapled ticket travels with it (offline-verifiable). Skipped without
      # Apple credentials. .app bundles (unlike bare binaries) can be stapled.
      - name: Notarize + staple desktop app
        if: env.HAS_NOTARY_CREDS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          shopt -s nullglob
          for tgz in release-gui/dvalincode-gui-v*-macos-*.tar.gz; do
            work="$RUNNER_TEMP/$(basename "$tgz" .tar.gz)"
            rm -rf "$work"; mkdir -p "$work"
            tar xzf "$tgz" -C "$work"
            app="$(find "$work" -maxdepth 3 -name '*.app' | head -1)"
            [ -n "$app" ] || { echo "  ! no .app in $tgz, skipping"; continue; }
            echo "▶ Notarizing $(basename "$app") from $tgz"
            ditto -c -k --keepParent "$app" "$RUNNER_TEMP/app.zip"
            xcrun notarytool submit "$RUNNER_TEMP/app.zip" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" --wait
            xcrun stapler staple "$app"
            ( cd "$work" && tar czf "$GITHUB_WORKSPACE/$tgz" ./* )
            rm -f "$RUNNER_TEMP/app.zip"
          done
          # Refresh checksums for the repackaged archives.
          ( cd release-gui && shasum -a 256 dvalincode-gui-v* > SHA256SUMS-gui.txt )

      - name: List artifacts
        run: ls -lh release-gui/

      - name: Upload artifacts
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dvalincode-gui-${{ github.sha }}
          path: release-gui/*
          if-no-files-found: error

      # ── Publish as a PRE-RELEASE (tag push only) ─────────────────
      - name: Publish GitHub pre-release
        if: startsWith(github.ref, 'refs/tags/')
        # softprops/action-gh-release v3.0.1
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          prerelease: true
          generate_release_notes: true
          name: "Desktop GUI ${{ github.ref_name }} (experimental)"
          body: |
            **Experimental** native desktop GUI build (webview-bun).

            These binaries use the system webview and are unverified per platform —
            treat as a preview. The stable CLI + Web bundle is the recommended
            install path (`curl … | bash`) and is unaffected by this pre-release.
          files: |
            release-gui/dvalincode-gui-v*
            release-gui/SHA256SUMS-gui.txt
