<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="spike" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="95" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.18"/>

  <!-- ── Dragon-D body ───────────────────────────────────── -->

  <!-- Vertical bar (left spine of D) -->
  <rect x="100" y="88" width="60" height="336" rx="14" fill="url(#body)"/>

  <!-- Top arm -->
  <rect x="100" y="88" width="188" height="56" rx="14" fill="url(#body)"/>

  <!-- Bottom arm -->
  <rect x="100" y="368" width="188" height="56" rx="14" fill="url(#body)"/>

  <!-- Arc of D — the dragon's curved back -->
  <path d="M 268 88 Q 470 256 268 424"
        stroke="url(#body)" stroke-width="56" fill="none"
        stroke-linecap="round"/>

  <!-- ── Dragon spikes along the arc ───────────────────── -->
  <polygon points="368,148 404,104 398,164" fill="url(#spike)" opacity="0.90"/>
  <polygon points="415,210 456,176 444,228" fill="url(#spike)" opacity="0.80"/>
  <polygon points="432,272 472,252 456,300" fill="url(#spike)" opacity="0.75"/>
  <polygon points="415,338 452,322 432,368" fill="url(#spike)" opacity="0.80"/>
  <polygon points="378,390 406,382 386,418" fill="url(#spike)" opacity="0.70"/>

  <!-- ── Dragon eye ─────────────────────────────────────── -->
  <!-- Glow halo -->
  <circle cx="216" cy="192" r="28" fill="#818cf8" opacity="0.35" filter="url(#softglow)"/>
  <!-- Iris -->
  <circle cx="216" cy="192" r="22" fill="#c4b5fd" filter="url(#glow)"/>
  <!-- Slit pupil -->
  <ellipse cx="216" cy="192" rx="7" ry="18" fill="#0a0a10"/>
  <!-- Catchlight -->
  <circle cx="210" cy="185" r="5" fill="#ede9fe" opacity="0.75"/>
</svg>
