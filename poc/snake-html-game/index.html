<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Snake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f23;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    #app {
      background: #1a1a2e;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      padding: 24px 28px 28px;
      max-width: 520px;
      width: fit-content;
      text-align: center;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #00ff88;
      text-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
    }

    .scores {
      text-align: right;
      font-size: 14px;
      line-height: 1.5;
    }

    .scores .score { color: #ffffff; font-weight: 700; font-size: 16px; }
    .scores .high { color: #8888aa; font-size: 12px; }

    canvas {
      display: block;
      margin: 0 auto;
      border: 2px solid #16213e;
      border-radius: 8px;
      background: #0d0d1a;
      width: 460px;
      height: 460px;
      image-rendering: pixelated;
    }

    footer {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      min-height: 40px;
    }

    .status {
      font-size: 15px;
      font-weight: 600;
      color: #ff6b6b;
    }

    .status.playing { color: #00ff88; }

    button {
      background: #16213e;
      color: #e0e0e0;
      border: 2px solid #00ff88;
      border-radius: 8px;
      padding: 8px 20px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 1px;
    }

    button:hover { background: #1f2e5a; }
    button:active { transform: scale(0.96); }

    .controls-hint {
      font-size: 11px;
      color: #555577;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>🐍 SNAKE</h1>
      <div class="scores">
        <div class="score">Score: <span id="scoreDisplay">0</span></div>
        <div class="high">Best: <span id="highDisplay">0</span></div>
      </div>
    </header>

    <canvas id="gameCanvas" width="460" height="460"></canvas>

    <footer>
      <div class="status" id="statusDisplay">▶ Press any arrow key</div>
      <button id="restartBtn">↻ Restart</button>
    </footer>

    <div class="controls-hint">Arrow / WASD to move &nbsp;·&nbsp; Space to restart</div>
  </div>

  <script>
    (() => {
      // --- Constants ---
      const GRID_SIZE = 20;           // 20×20 cells
      const CELL_SIZE = 23;           // 460 / 20
      const TICK_MS = 140;

      // --- DOM refs ---
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreSpan = document.getElementById('scoreDisplay');
      const highSpan = document.getElementById('highDisplay');
      const statusEl = document.getElementById('statusDisplay');
      const restartBtn = document.getElementById('restartBtn');

      // --- State ---
      let snake = [];                 // [{x, y}, …] head first
      let food = { x: 8, y: 10 };
      let direction = 'RIGHT';        // current heading
      let nextDirection = 'RIGHT';    // buffered next direction
      let score = 0;
      let highScore = 0;
      let gameOver = false;
      let intervalId = null;

      // --- Load high score ---
      try {
        const saved = localStorage.getItem('snake_high');
        if (saved) highScore = parseInt(saved, 10) || 0;
      } catch (_) { /* localStorage unavailable */ }
      highSpan.textContent = highScore;

      // --- Helpers ---
      function randomInt(max) {
        return Math.floor(Math.random() * max);
      }

      // Check if a cell is occupied by the snake
      function isOnSnake(x, y, includeHead = true) {
        const start = includeHead ? 0 : 1;
        for (let i = start; i < snake.length; i++) {
          if (snake[i].x === x && snake[i].y === y) return true;
        }
        return false;
      }

      // Place food on a random empty cell
      function placeFood() {
        const total = GRID_SIZE * GRID_SIZE;
        if (snake.length >= total) {
          // Snake fills the board — you win! Treat as game over.
          gameOver = true;
          return;
        }

        // Collect free cells
        const free = [];
        for (let y = 0; y < GRID_SIZE; y++) {
          for (let x = 0; x < GRID_SIZE; x++) {
            if (!isOnSnake(x, y)) free.push({ x, y });
          }
        }
        if (free.length === 0) {
          gameOver = true;
          return;
        }
        food = free[randomInt(free.length)];
      }

      // --- Init ---
      function init() {
        // Stop any running loop
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }

        // Snake: 3 cells, head at (10,10), facing right
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 },
        ];
        direction = 'RIGHT';
        nextDirection = 'RIGHT';
        score = 0;
        gameOver = false;
        scoreSpan.textContent = '0';
        statusEl.textContent = '▶ Playing';
        statusEl.className = 'status playing';

        placeFood();
        draw();

        // Start loop
        intervalId = setInterval(tick, TICK_MS);
      }

      // --- Game tick ---
      function tick() {
        if (gameOver) return;

        // Commit buffered direction
        direction = nextDirection;

        // Calculate new head position
        const head = snake[0];
        let newHead = { x: head.x, y: head.y };

        switch (direction) {
          case 'RIGHT': newHead.x += 1; break;
          case 'LEFT':  newHead.x -= 1; break;
          case 'UP':    newHead.y -= 1; break;
          case 'DOWN':  newHead.y += 1; break;
        }

        // Wall wrap-around
        if (newHead.x < 0) newHead.x = GRID_SIZE - 1;
        if (newHead.x >= GRID_SIZE) newHead.x = 0;
        if (newHead.y < 0) newHead.y = GRID_SIZE - 1;
        if (newHead.y >= GRID_SIZE) newHead.y = 0;

        // Self-collision check (skip the tail because it will move away — unless we're eating)
        const willEat = (newHead.x === food.x && newHead.y === food.y);
        const checkLen = willEat ? snake.length : snake.length - 1;
        for (let i = 0; i < checkLen; i++) {
          if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
            endGame();
            return;
          }
        }

        // Move snake
        snake.unshift(newHead);

        if (willEat) {
          // Grow — don't pop tail
          score += 10;
          scoreSpan.textContent = score;
          if (score > highScore) {
            highScore = score;
            highSpan.textContent = highScore;
            try { localStorage.setItem('snake_high', String(highScore)); } catch (_) {}
          }
          placeFood();
          if (gameOver) return; // board full
        } else {
          snake.pop();
        }

        draw();
      }

      // --- End game ---
      function endGame() {
        gameOver = true;
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
        statusEl.textContent = '💀 Game Over — Press Space or click Restart';
        statusEl.className = 'status';
        draw();
      }

      // --- Draw ---
      function draw() {
        ctx.clearRect(0, 0, 460, 460);

        // Grid lines (subtle)
        ctx.strokeStyle = '#1a1a30';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID_SIZE; i++) {
          const pos = i * CELL_SIZE;
          ctx.beginPath();
          ctx.moveTo(pos, 0);
          ctx.lineTo(pos, 460);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, pos);
          ctx.lineTo(460, pos);
          ctx.stroke();
        }

        // Snake body (tail → head)
        for (let i = snake.length - 1; i >= 0; i--) {
          const seg = snake[i];
          const x = seg.x * CELL_SIZE + 1;
          const y = seg.y * CELL_SIZE + 1;
          const size = CELL_SIZE - 2;

          if (i === 0) {
            // Head
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 6;
            ctx.fillRect(x, y, size, size);
            ctx.shadowBlur = 0;

            // Eyes (two tiny dots)
            ctx.fillStyle = '#0d0d1a';
            const eyeOff = 5;
            const eyeSize = 3;
            if (direction === 'RIGHT') {
              ctx.fillRect(x + size - eyeOff, y + 4, eyeSize, eyeSize);
              ctx.fillRect(x + size - eyeOff, y + size - 4 - eyeSize, eyeSize, eyeSize);
            } else if (direction === 'LEFT') {
              ctx.fillRect(x + eyeOff - eyeSize, y + 4, eyeSize, eyeSize);
              ctx.fillRect(x + eyeOff - eyeSize, y + size - 4 - eyeSize, eyeSize, eyeSize);
            } else if (direction === 'UP') {
              ctx.fillRect(x + 4, y + eyeOff - eyeSize, eyeSize, eyeSize);
              ctx.fillRect(x + size - 4 - eyeSize, y + eyeOff - eyeSize, eyeSize, eyeSize);
            } else { // DOWN
              ctx.fillRect(x + 4, y + size - eyeOff, eyeSize, eyeSize);
              ctx.fillRect(x + size - 4 - eyeSize, y + size - eyeOff, eyeSize, eyeSize);
            }
          } else {
            // Body — gradient from bright to darker green
            const t = i / Math.max(snake.length - 1, 1);
            const g = Math.round(200 - t * 60);
            ctx.fillStyle = `rgb(0, ${g}, 80)`;
            ctx.fillRect(x, y, size, size);
          }
        }

        // Food
        const fx = food.x * CELL_SIZE + 1;
        const fy = food.y * CELL_SIZE + 1;
        ctx.fillStyle = '#ff4757';
        ctx.shadowColor = '#ff4757';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(fx + (CELL_SIZE - 2) / 2, fy + (CELL_SIZE - 2) / 2, (CELL_SIZE - 2) / 2 - 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Game-over overlay
        if (gameOver) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
          ctx.fillRect(0, 0, 460, 460);
          ctx.fillStyle = '#ff6b6b';
          ctx.font = 'bold 32px "Courier New", Courier, monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('GAME OVER', 230, 230);
        }
      }

      // --- Keyboard handling ---
      function handleKey(e) {
        const key = e.key;

        // Restart on Space when game over
        if (key === ' ' || key === 'Spacebar') {
          e.preventDefault();
          if (gameOver) {
            init();
          }
          return;
        }

        // Restart on Enter when game over
        if (key === 'Enter') {
          if (gameOver) {
            e.preventDefault();
            init();
          }
          return;
        }

        if (gameOver) return;

        // Map keys to directions
        let dir = null;
        if (key === 'ArrowUp' || key === 'w' || key === 'W') dir = 'UP';
        else if (key === 'ArrowDown' || key === 's' || key === 'S') dir = 'DOWN';
        else if (key === 'ArrowLeft' || key === 'a' || key === 'A') dir = 'LEFT';
        else if (key === 'ArrowRight' || key === 'd' || key === 'D') dir = 'RIGHT';

        if (!dir) return;
        e.preventDefault();

        // Prevent 180° reversal
        const opposites = { UP: 'DOWN', DOWN: 'UP', LEFT: 'RIGHT', RIGHT: 'LEFT' };
        if (dir === opposites[direction]) return;

        nextDirection = dir;
      }

      // --- Button restart ---
      restartBtn.addEventListener('click', init);

      // --- Keyboard listener ---
      document.addEventListener('keydown', handleKey);

      // --- Start! ---
      init();
    })();
  </script>
</body>
</html>
